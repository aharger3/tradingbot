# fable_rules.yaml — structured trading rules extracted from
# Scarface Trades + JDub Trades content (12 videos, strategy audit 2026-06-25,
# strategy-scarface-trades.md synthesis 2026-06-10).
# Consumed by Omen signal bot. Generated by Fable 2026-07-03.

meta:
  sources:
    - scarface-jdub-strategy-audit.md
    - strategy-scarface-trades.md
    - rules.md (current bot spec)
  traders: [scarface_trades, jdub_trades]
  session_window_et: "09:30-11:00"
  min_rr: 2.0

timeframes:
  # JDub top-down: direction -> location -> execution, in order
  scalper:
    direction_htf: 1h
    location_mtf: 15m
    execution_ltf: 1m
  day_trader:
    direction_htf: 4h
    location_mtf: 15m
    execution_ltf: 5m
  swing_trader:
    direction_htf: daily
    location_mtf: 1h
    execution_ltf: 15m
  bot_gap: "bot runs 1m only; add HTF direction check before scanning (audit gap #1, Critical)"

reference_levels:
  primary: [pdh_pdl]            # both traders agree; biggest missing concept in bot
  secondary: [premarket_hl, opening_range]
  opening_range:
    scarface_method: "first SINGLE 5-min candle (9:30-9:35) high/low — the 'box'"
    bot_method: "high/low of first 5 x 1-min candles (different range — audit gap #9)"
  usage: "treat levels as AREAS not exact lines (JDub); price may wick slightly past"
  marking: "mark levels on 15m/1h chart, execute on 1m/5m"

confluence_filters:
  daily_20_sma: "above = bullish bias, below = bearish; trend direction"
  intraday_vwap: "above = bullish intraday, below = bearish; momentum confirm"
  rule: "both must align for high-probability entry; confluence tools, NOT entry signals"
  relative_strength: "compare symbol vs SPY/QQQ; skip call if index dropping"

strategies:
  break_and_retest:
    primary_levels: [pdh_pdl, premarket_hl, opening_range]
    breakout_condition: "candle CLOSES outside level, with displacement (strong momentum candle; skip slow/hesitant breaks)"
    displacement_gate: "break candle body >= 1.5x avg body of prior N candles"
    retest_condition: "candle touches level (or the FVG left by displacement) and closes back outside"
    fvg_retest: "3-candle gap (candle[i].high < candle[i+2].low bullish) is valid retest zone in addition to raw level"
    confirmed_by:
      bullish: [hammer, bullish_engulfing]
      bearish: [inverted_hammer_shooting_star, bearish_engulfing]
      note: "named patterns required — generic 'strong PA / large wick' is NOT sufficient (audit gap #2)"
    stop_placement: "break of the ENTRY candle per Scarface video; rules.md says below breakout level — entry-candle stop is the taught version"
    target: "2R fixed; scale 25-50% at HOD/first major level, leave runner"
    no_trade: "never trade INSIDE the box/range (low probability zone)"
    claimed_backtest: "69% WR, 2.58 PF, 29 trades / 2 months"
    a_plus_setup:
      - hammer_stick at retest
      - level in [pdh, pdl]
      - htf_trend_aligned
      - lower_wick > 2x body
      - close in top 25% of candle range
    grade_definitions:
      A+: all a_plus_setup conditions met
      A: engulfing at key level + HTF aligned
      B: strong PA (large wick) at key level, HTF neutral
      C: weak retest, structure supports it
      D: skip (stop too tight, consolidation, no level)

  one_candle_rule:
    alternate_name: order_block
    definition: "LAST opposing-close candle before structural breakout — NOT any candle in a 10-bar lookback (audit gap #6)"
    bullish: "last red (down-close) candle before leg up in an uptrend"
    bearish: "last green (up-close) candle before leg down in a downtrend"
    precondition: "clear trend first (HH/HL or LH/LL); structure context required"
    entry_priority: [wick_only, wick_to_body, full_candle_body]  # wick retest strongest
    entry_models: [top_of_block_aggressive, middle_of_block, confirmation_candle_close_through]
    confirmation: "close back through the zone (above for longs / below for shorts) = absorption"
    stop: "just below order block low (longs) / above high (shorts)"

  rule_of_84:
    trigger: "valid setup stopped out legitimately"
    pre_checks:                      # ALL three before re-entry (bot currently skips these)
      - "Did the trade break the trend? (structure still intact?)"
      - "Was the stop loss too tight? (reasonable in hindsight?)"
      - "Could this trade still work? (neutral validity check)"
    reentry_condition: "candle CLOSE at or beyond exact original entry level (reclaim)"
    same_stop_target: true           # same stop, same target as first attempt
    sizing: "base + 50% (rules.md; NOT implemented in signal_runner.py)"
    skip_if: "candle already near high of day — RR gone"
    not_revenge_trading: "pre-checks are the difference"

  pdh_pdl_scalper:                   # JDub — not in bot yet
    scenarios:
      pdh_continuation: {direction: long, action: "break above PDH, close above, hold"}
      pdl_bounce: {direction: long, action: "price reaches PDL, buyers step in"}
      pdh_rejection: {direction: short, action: "price rejects at PDH"}
      pdl_continuation: {direction: short, action: "break below PDL, hold underneath"}
    targets: [low_high_of_day, fixed_1_to_2_rr]
    bias: none

  box_strategy:                      # JDub — closest to current bot but box = PREV DAY range, not 5-min OR
    box: previous_day_high_to_low
    trade_at: edges_only             # top = resistance, bottom = support
    never: middle_of_box
    continuation: "break -> retest top/bottom -> enter"
    context: "multiple boxes from multiple prior days = more context"

  swing:                             # JDub — not implemented, Low priority
    trend: daily 9_ema + 21_ema
    entry: pullback_to_emas
    models: [undercut_and_reclaim, break_and_retest]
    scaling: "scale in with price, never against"

no_trade_zones:
  - middle of previous day range
  - all reference levels bunched (PDH/PDL/PMH/PML/OR within 0.5% of each other)
  - opening range tighter than 0.3%
  - inside the opening-range box

consolidation_skip:
  condition: "PDH/PDL/premarket_HL/5min_OR within 0.5% of each other"
  reason: no clear directional bias

session_rules:
  a_plus_only: true
  max_attempts: 2
  stop_after: "1 win (Scarface: bank green, done) — bot uses 2 losses; different, stricter"
  window_et: "09:30-11:00"
  first_90_min: "90% of profits — both traders agree"

risk:
  max_loss_per_trade: "$1000 fixed (traders teach % of equity instead — open question)"
  rr_min: 2.0
  contract: "first ATM or first OTM weekly; next-week only on unusually high vol (bot: nearest ATM only)"
  reentry_size: base_plus_50pct

candlestick_definitions:
  hammer: "lower wick > 2x body, close in top 25% of range"
  shooting_star: "inverse of hammer"
  engulfing: "open question: engulf prior body only, or full range incl wicks? (audit Q12)"

known_bot_issues:
  - "PUT-side direction inverted (2026-05-27 META fired CALL, correct read PUT) — put signals informational only until validated"
  - "Alpaca 15-min delayed data on 1-min chart is fundamentally broken for scalping — Tastytrade integration is Critical"
  - "84% sizing +50% in rules.md but not in signal_runner.py"
  - "OR computed from 5x1min candles vs Scarface single 5-min candle"

priority_fixes:  # from audit section 6, effort:impact ordered
  1: add PDH/PDL as primary reference levels (low effort, high impact)
  2: add VWAP + daily 20 SMA confluence filter
  3: named-pattern entry confirmation (hammer/engulfing) replacing generic strong-PA
  4: HTF direction check (1h/4h) before 1-min scan
  5: 84% rule pre-check evaluation + same stop/target
  6: rebuild One Candle Rule as true order-block detector (structure breaks)
  7: Tastytrade real-time data (Critical — delayed data breaks scalping)
  8: automate 2-loss-day halt
